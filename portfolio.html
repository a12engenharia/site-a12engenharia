<style>
:root{
--sans:'Inter',system-ui,sans-serif;
--navy:#1e2d45;
--navy2:#162238;
--navy3:#0d1525;
--gold:#cea94a;
--gold2:#b8922e;
--white:#ffffff;
--text:#e8edf2;
--body:#a0b0c0;
--bege:#1a2540;
--bege2:#162035;
--bege3:#1e2d45;
--border:rgba(206,169,74,.15);
--border2:rgba(206,169,74,.35);
--nav-bg:#0d1525;
--orange:#cea94a;
--orange2:#b8922e;
--grid-line:rgba(255,255,255,.04)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy3);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.65;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 6%;background:var(--nav-bg);border-bottom:1px solid rgba(206,169,74,.15)}
.nav-brand img{height:72px;width:auto;display:block}
nav ul{list-style:none;display:flex;gap:2rem;align-items:center}
nav ul a{font-size:14px;font-weight:500;color:rgba(232,237,242,.75);text-decoration:none;transition:color .2s}
nav ul a:hover{color:var(--gold)}
.nav-btn{background:var(--gold)!important;color:#0d1525!important;padding:10px 22px;border-radius:6px;font-weight:600!important}
.port-hero{padding:140px 6% 60px;background:var(--navy3);position:relative;overflow:hidden}
.port-hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(206,169,74,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(206,169,74,.04) 1px,transparent 1px);background-size:56px 56px}
.port-hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.s-tag{display:inline-flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.s-tag::before{content:'';width:20px;height:2px;background:var(--gold);border-radius:1px}
.port-hero h1{font-size:clamp(28px,3vw,44px);font-weight:700;color:var(--white);margin-bottom:12px}
.port-hero p{font-size:18px;color:rgba(160,176,192,.7);max-width:560px}
.port-back{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:rgba(160,176,192,.5);text-decoration:none;margin-bottom:28px;transition:color .2s}
.port-back:hover{color:var(--white)}
.port-section{padding:60px 6% 80px}
.port-wrap{max-width:1200px;margin:0 auto}
.estado-label{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:40px 0 16px;display:flex;align-items:center;gap:10px}
.estado-label::before{content:'';width:20px;height:2px;background:var(--gold);border-radius:1px}
.estado-label:first-child{margin-top:0}
.port-grid-full{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:8px}
.proj-card{background:var(--bege);border:1px solid rgba(206,169,74,.15);border-radius:14px;overflow:hidden;transition:box-shadow .25s,transform .2s;cursor:pointer}
.proj-card:hover{box-shadow:0 8px 40px rgba(0,0,0,.3);transform:translateY(-3px)}
.proj-thumb{height:220px;background:var(--navy2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.proj-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85}
.proj-em-construcao{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.proj-em-construcao svg{width:32px;height:32px;stroke:var(--gold);opacity:.5}
.proj-em-construcao span{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);opacity:.6}
.proj-badge{position:absolute;top:14px;left:14px;background:rgba(13,21,37,.85);border:1px solid rgba(206,169,74,.3);border-radius:100px;padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.proj-body{padding:20px}
.proj-loc{font-size:13px;color:var(--gold);opacity:.8;margin-bottom:8px}
.proj-desc{font-size:14px;color:rgba(160,176,192,.8);line-height:1.7;margin-bottom:12px}
.proj-discs{display:flex;flex-wrap:wrap;gap:5px}
.proj-disc{font-size:11px;font-weight:500;background:rgba(206,169,74,.08);border:1px solid rgba(206,169,74,.2);border-radius:100px;padding:3px 9px;color:rgba(232,237,242,.7)}
#lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,16,40,.92);align-items:center;justify-content:center}
#lbClose{position:absolute;top:24px;right:28px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;z-index:1001}
#lbPrev,#lbNext{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,244,222,.1);border:1px solid rgba(255,244,222,.2);color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
#lbPrev{left:20px}#lbNext{right:20px}
.lb-inner{max-width:900px;width:90%;text-align:center}
#lbImg{width:100%;height:520px;background:rgba(255,244,222,.04);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;overflow:hidden}
#lbImg img{width:100%;height:100%;object-fit:cover;display:none}
.wpp{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;align-items:center;gap:10px;background:#25d366;color:#fff;padding:14px 24px;border-radius:100px;font-size:15px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(37,211,102,.45);transition:transform .2s}
.wpp:hover{transform:translateY(-2px)}
.wpp svg{width:22px;height:22px;fill:#fff}
@media(max-width:1024px){.port-grid-full{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){nav ul{display:none}.port-grid-full{grid-template-columns:1fr}#lbImg{height:280px}}
</style>
</head>

// Separar projetos com e sem imagem
function getEstadoSigla(loc) {
  var map = {'BA':'Bahia','MG':'Minas Gerais','PA':'Pará','PE':'Pernambuco','RJ':'Rio de Janeiro','SC':'Santa Catarina','SP':'São Paulo'};
  for (var uf in map) {
    if (loc.indexOf(', ' + uf) !== -1 || loc.indexOf(map[uf]) !== -1) return map[uf];
  }
  return 'Outros';
}

var comImagem = [], semImagem = [];
projetos.forEach(function(p, i) {
  if (p.imgs && p.imgs.length > 0) {
    comImagem.push({p: p, i: i, est: getEstadoSigla(p.loc)});
  } else {
    semImagem.push({p: p, i: i, est: getEstadoSigla(p.loc)});
  }
});

// Ordenar com imagem por estado alfabético, depois por nome
comImagem.sort(function(a, b) {
  if (a.est < b.est) return -1;
  if (a.est > b.est) return 1;
  if (a.p.nome < b.p.nome) return -1;
  if (a.p.nome > b.p.nome) return 1;
  return 0;
});

// Ordenar sem imagem por estado alfabético também
semImagem.sort(function(a, b) {
  if (a.est < b.est) return -1;
  if (a.est > b.est) return 1;
  return 0;
});

function renderCard(item) {
  var p = item.p, i = item.i;
  var thumb;
  if (p.emConstrucao) {
    thumb = '<div class="proj-em-construcao"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span>Em breve</span></div>';
  } else if (p.imgs && p.imgs[0]) {
    thumb = '<img src="' + p.imgs[0] + '" alt="' + p.nome + '">';
  } else {
    thumb = '';
  }
  return '<div class="proj-card" onclick="openLightbox(' + i + ')">' +
    '<div class="proj-thumb">' + thumb + '<span class="proj-badge">' + p.nome + '</span></div>' +
    '<div class="proj-body">' +
    '<div class="proj-loc">' + p.loc + '</div>' +
    '<p class="proj-desc">' + p.desc + '</p>' +
    '<div class="proj-discs">' + p.discs.map(function(d){ return '<span class="proj-disc">' + d + '</span>'; }).join('') + '</div>' +
    '</div></div>';
}

var wrap = document.getElementById('portWrap');
var html = '<div class="port-grid-full">';
comImagem.forEach(function(item) { html += renderCard(item); });
semImagem.forEach(function(item) { html += renderCard(item); });
html += '</div>';
wrap.innerHTML = html;

// LIGHTBOX
var lbIdx = 0, lbImgIdx = 0, lbSlider;
function openLightbox(idx) { lbIdx = idx; lbImgIdx = 0; renderLightbox(); document.getElementById('lightbox').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
function renderLightbox() {
  var p = projetos[lbIdx];
  document.getElementById('lbTitle').textContent = p.nome;
  document.getElementById('lbLoc').textContent = p.loc;
  document.getElementById('lbDesc').textContent = p.desc;
  document.getElementById('lbDiscs').innerHTML = p.discs.map(function(d){ return '<span style="font-size:12px;background:rgba(206,169,74,.08);border:1px solid rgba(206,169,74,.2);border-radius:100px;padding:4px 10px;color:rgba(232,237,242,.7)">' + d + '</span>'; }).join('');
  var imgEl = document.getElementById('lbImgEl'), ph = document.getElementById('lbPh');
  if (p.imgs && p.imgs[lbImgIdx]) { imgEl.src = p.imgs[lbImgIdx]; imgEl.style.display = 'block'; ph.style.display = 'none'; }
  else { imgEl.style.display = 'none'; ph.style.display = 'block'; }
  var total = p.imgs ? p.imgs.length : 0;
  document.getElementById('lbImgNav').innerHTML = total > 1 ? p.imgs.map(function(_,i){ return '<span onclick="lbGoImg(' + i + ')" style="width:8px;height:8px;border-radius:50%;background:' + (i===lbImgIdx?'var(--gold)':'rgba(255,244,222,.2)') + ';cursor:pointer;display:inline-block"></span>'; }).join('') : '';
  document.getElementById('lbPrev').onclick = function() { if(total>1){ lbImgIdx=(lbImgIdx-1+total)%total; renderLightbox(); } };
  document.getElementById('lbNext').onclick = function() { if(total>1){ lbImgIdx=(lbImgIdx+1)%total; renderLightbox(); } };
  document.getElementById('lbPrev').style.display = total>1?'flex':'none';
  document.getElementById('lbNext').style.display = total>1?'flex':'none';
  clearInterval(lbSlider);
  if (total>1) lbSlider = setInterval(function(){ lbImgIdx=(lbImgIdx+1)%total; renderLightbox(); }, 3000);
}
function lbGoImg(i) { lbImgIdx = i; clearInterval(lbSlider); renderLightbox(); }
document.getElementById('lbClose').onclick = function() { document.getElementById('lightbox').style.display='none'; document.body.style.overflow=''; clearInterval(lbSlider); };
document.getElementById('lightbox').addEventListener('click', function(e) { if(e.target===this){ this.style.display='none'; document.body.style.overflow=''; clearInterval(lbSlider); } });
document.addEventListener('keydown', function(e) { if(e.key==='Escape'){ document.getElementById('lightbox').style.display='none'; document.body.style.overflow=''; clearInterval(lbSlider); } });
</script>
